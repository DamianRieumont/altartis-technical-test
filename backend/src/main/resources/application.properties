spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:altairis}
spring.datasource.username=${DB_USER:altairis}
spring.datasource.password=${DB_PASSWORD:altairis}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

app.seed.mode=${APP_SEED_MODE:demo}
app.seed.large.hotels=${APP_SEED_LARGE_HOTELS:2000}

server.port=8080
